name: Release Merkle Proof Service

on:
  push:
    branches-ignore:
      - '**'
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

jobs:
  docker_build_push:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#merkle-proof-service-}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            registry.digitalocean.com/availj/merkle-proof-service:${{ steps.version.outputs.version }}
            registry.digitalocean.com/availj/merkle-proof-service:latest
          cache-from: |
            type=gha,scope=merkle-proof-service
            type=registry,ref=registry.digitalocean.com/availj/merkle-proof-service:buildcache
          cache-to: |
            type=gha,scope=merkle-proof-service,mode=max
            type=registry,ref=registry.digitalocean.com/availj/merkle-proof-service:buildcache,mode=max
